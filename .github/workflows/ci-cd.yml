name: Tests

on:
  push:
    branches: [ "master", "Development" ]
  pull_request:
    branches: [ "master", "Development" ]

jobs:
  tests:

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v4

    - name: 'Setup Testing Database Config'
      run : mv config/dbconnection_testing_template.php config/dbconnection.php

    - name: 'Setup Testing Portal Config'
      run : mv config/symbini_testing_template.php config/symbini.php

    - name: 'Setup File permission'
      run : mkdir ci_temp && chmod -R 777 ci_temp

    - name: 'Run Setup Script'
      run : cd config && bash setup.bash

    - name: 'Build Docker Resources'
      run : |
        echo --- Building and Starting up docker ---
        docker compose --file test.docker-compose.yml pull
        docker compose --file test.docker-compose.yml up -d --no-build
        echo --- Containers Up ---

    - name: Debugging Container Failure
      if: failure()
      run: |
        docker ps
        docker logs symbiota-testing-web-1
        docker logs symbiota-testing-mariadb-1

    - name: Duplicate symbdb's for parallel testing
      run: |
        if [ "${{ matrix.browser }}" == "chromium" ]; then
          echo "DB_DATABASE=ci_testing_chromium" >> $GITHUB_ENV
          docker exec symbiota-testing-mariadb-1 echo "CREATE DATABASE ci_testing_chromium;" | mariadb
          docker exec symbiota-testing-web-1 mysqldump ci_testing | mariadb ci_testing_chromium
          #GRANT SELECT,EXECUTE ON `symbdb`.* TO `symbreader`@localhost;
          #GRANT SELECT,UPDATE,INSERT,DELETE,EXECUTE ON `symbdb`.* TO `symbwriter`@localhost;
        else if [ "${{ matrix.browser }}" == "firefox" ]; then
          echo "DB_DATABASE=ci_testing_firefox" >> $GITHUB_ENV
          docker exec symbiota-testing-mariadb-1 echo "CREATE DATABASE ci_testing_firefox;" | mariadb
          docker exec symbiota-testing-web-1 mysqldump ci_testing | mariadb ci_testing_firefox
         else if [ "${{ matrix.browser }}" == "webkit" ]; then
          echo "DB_DATABASE=ci_testing_webkit" >> $GITHUB_ENV
          docker exec symbiota-testing-mariadb-1 echo "CREATE DATABASE ci_testing_webkit;" | mariadb
          docker exec symbiota-testing-web-1 mysqldump ci_testing | mariadb ci_testing_webkit
        fi

    - name: 'Install PhpUnit'
      run : docker exec symbiota-testing-web-1 composer require --dev phpunit/phpunit

    - name: 'Execute Tests via PHPUnit'
      run: docker exec symbiota-testing-web-1 ./vendor/bin/phpunit

    - name: 'Run Playwright Tests'
      run: docker run --rm -v .:/var/www/html --network=host --ipc=host mcr.microsoft.com/playwright:v1.56.0-noble /bin/bash -c "cd /var/www/html && npm install @playwright/test@1.56.0 mysql2@3.16.0 --save-dev && npx playwright test"

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

